<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Proyeksi Pendapatan</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;  
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap; /* Membantu tampilan di layar kecil */
        }
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #34495e;
        }
        input[type="number"], 
        input[type="date"], 
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #27ae60;
        }
        .summary {
            background-color: #e8f8f5;
            border-left: 5px solid #1abc9c;
            padding: 15px 20px;
            margin-top: 25px;
            border-radius: 4px;
            display: none;
        }
        .summary h3 {
            margin-top: 0;
            color: #16a085;
            margin-bottom: 10px;
        }
        .summary p {
            margin: 5px 0;
        }
        .table-responsive {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            border: 1px solid #ecf0f1;
            text-align: left;
        }
        th {
            background-color: #34495e;
            color: white;
            position: sticky;
            top: 0;
        }
        tr:nth-child(even) {
            background-color: #f9fbfd;
        }
        tr:hover {
            background-color: #f1f4f8;
        }
        /* Style khusus untuk baris hari libur */
        tr.libur {
            background-color: #fdf2e9 !important;
            color: #e67e22;
        }
        tr.libur:hover {
            background-color: #fae5d3 !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Kalkulator Proyeksi Pendapatan</h1>
    
    <div class="form-row">
        <div class="form-group">
            <label for="dailyIncome">Pendapatan Per Hari Aktif (Rp):</label>
            <input type="number" id="dailyIncome" placeholder="Contoh: 150000" required>
        </div>
        <div class="form-group">
            <label for="startDate">Mulai Tanggal:</label>
            <input type="date" id="startDate" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="workDaysOption">Opsi Hari Kerja:</label>
            <select id="workDaysOption">
                <option value="all">Gas Terus (Setiap Hari)</option>
                <option value="sunday_off">Libur Minggu</option>
                <option value="weekend_off">Libur Sabtu & Minggu</option>
            </select>
        </div>
        <div class="form-group">
            <label for="targetMode">Mode Proyeksi:</label>
            <select id="targetMode" onchange="toggleMode()">
                <option value="date">Berdasarkan Tanggal Selesai</option>
                <option value="nominal">Berdasarkan Target Nominal</option>
            </select>
        </div>
    </div>

    <div class="form-row" id="dynamicInputRow">
        <div class="form-group" id="endDateGroup">
            <label for="endDate">Sampai Tanggal:</label>
            <input type="date" id="endDate">
        </div>
        
        <div class="form-group" id="targetNominalGroup" style="display:none;">
            <label for="targetNominal">Target Nominal (Rp):</label>
            <input type="number" id="targetNominal" placeholder="Contoh: 5000000">
        </div>
    </div>

    <button onclick="calculateProjection()">Hitung Proyeksi</button>

    <div id="summary" class="summary"></div>

    <div class="table-responsive">
        <table id="resultTable" style="display: none;">
            <thead>
                <tr>
                    <th>Hari Ke-</th>
                    <th>Tanggal</th>
                    <th>Pendapatan Harian</th>
                    <th>Total Terkumpul</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    // Set tanggal hari ini sebagai default
    document.getElementById('startDate').valueAsDate = new Date();

    // Mengganti tampilan input berdasarkan mode
    function toggleMode() {
        const mode = document.getElementById('targetMode').value;
        if (mode === 'date') {
            document.getElementById('endDateGroup').style.display = 'block';
            document.getElementById('targetNominalGroup').style.display = 'none';
        } else {
            document.getElementById('endDateGroup').style.display = 'none';
            document.getElementById('targetNominalGroup').style.display = 'block';
        }
    }

    // Format Rupiah
    function formatRupiah(angka) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
    }

    // Cek apakah suatu tanggal adalah hari kerja berdasarkan opsi yang dipilih
    function isWorkDay(date, option) {
        const day = date.getDay(); // 0 = Minggu, 1 = Senin, ..., 6 = Sabtu
        if (option === 'all') return true;
        if (option === 'sunday_off' && day === 0) return false;
        if (option === 'weekend_off' && (day === 0 || day === 6)) return false;
        return true;
    }

    function calculateProjection() {
        const dailyIncome = parseFloat(document.getElementById('dailyIncome').value);
        const startDateInput = document.getElementById('startDate').value;
        const mode = document.getElementById('targetMode').value;
        const workDaysOption = document.getElementById('workDaysOption').value;

        if (!startDateInput || isNaN(dailyIncome) || dailyIncome <= 0) {
            alert('Mohon isi Pendapatan Per Hari dan Mulai Tanggal dengan nominal yang valid (> 0).');
            return;
        }

        let currentDate = new Date(startDateInput);
        currentDate.setHours(0,0,0,0);
        
        let currentTotal = 0;
        let dayCount = 0;
        let workingDaysCount = 0;
        let tableData = [];

        if (mode === 'date') {
            const endDateInput = document.getElementById('endDate').value;
            if (!endDateInput) {
                alert('Mohon isi Sampai Tanggal.');
                return;
            }
            let endDate = new Date(endDateInput);
            endDate.setHours(0,0,0,0);

            if (endDate < currentDate) {
                alert('Sampai Tanggal tidak boleh lebih awal dari Mulai Tanggal.');
                return;
            }

            // Loop hari demi hari sampai tanggal selesai
            while (currentDate <= endDate) {
                dayCount++;
                let workingToday = isWorkDay(currentDate, workDaysOption);
                let incomeToday = 0;

                if (workingToday) {
                    incomeToday = dailyIncome;
                    currentTotal += dailyIncome;
                    workingDaysCount++;
                }

                tableData.push({
                    day: dayCount,
                    date: new Date(currentDate),
                    income: incomeToday,
                    total: currentTotal,
                    isWorking: workingToday
                });

                // Lanjut ke hari berikutnya
                currentDate.setDate(currentDate.getDate() + 1);
            }

        } else {
            const targetNominal = parseFloat(document.getElementById('targetNominal').value);
            if (isNaN(targetNominal) || targetNominal <= 0) {
                alert('Mohon isi Target Nominal dengan benar.');
                return;
            }

            // Loop hari demi hari sampai target nominal tercapai
            while (currentTotal < targetNominal) {
                dayCount++;
                let workingToday = isWorkDay(currentDate, workDaysOption);
                let incomeToday = 0;

                if (workingToday) {
                    incomeToday = dailyIncome;
                    currentTotal += dailyIncome;
                    workingDaysCount++;
                }

                tableData.push({
                    day: dayCount,
                    date: new Date(currentDate),
                    income: incomeToday,
                    total: currentTotal,
                    isWorking: workingToday
                });

                currentDate.setDate(currentDate.getDate() + 1);
            }
        }

        // --- Render Tabel dan Ringkasan ---
        const tbody = document.querySelector('#resultTable tbody');
        const resultTable = document.getElementById('resultTable');
        const summaryDiv = document.getElementById('summary');
        
        tbody.innerHTML = '';

        tableData.forEach(data => {
            const row = document.createElement('tr');
            
            // Tambahkan class 'libur' jika hari itu bukan hari kerja
            if (!data.isWorking) {
                row.className = 'libur';
            }

            let dateString = data.date.toLocaleDateString('id-ID', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });

            // Teks pendapatan harian diganti 'Libur' jika tidak bekerja
            let incomeText = data.isWorking ? formatRupiah(data.income) : '<em>Libur</em>';

            row.innerHTML = `
                <td>${data.day}</td>
                <td>${dateString}</td>
                <td>${incomeText}</td>
                <td><strong>${formatRupiah(data.total)}</strong></td>
            `;
            tbody.appendChild(row);
        });

        resultTable.style.display = 'table';
        
        // Ambil tanggal terakhir dari array data
        const finalDate = tableData[tableData.length - 1].date;

        summaryDiv.style.display = 'block';
        summaryDiv.innerHTML = `
            <h3>Ringkasan Proyeksi:</h3>
            <p>⏳ Total Durasi: <strong>${dayCount} Hari</strong> (<em>Total Hari Aktif Kerja: ${workingDaysCount} Hari</em>)</p>
            <p>📅 Tanggal Selesai/Pencapaian: <strong>${finalDate.toLocaleDateString('id-ID', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'})}</strong></p>
            <p>💰 Estimasi Total Pendapatan: <strong>${formatRupiah(currentTotal)}</strong></p>
        `;
    }
</script>

</body>
</html>
